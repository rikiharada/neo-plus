<div class="content-area dashboard-health" style="padding: 0 var(--spacing-lg); display: block; gap: var(--spacing-xl); background-color: var(--bg-color); padding-bottom: 120px;">
    <!-- Center Profit Ring -->
    <div style="display: grid; place-items: center; margin-top: var(--spacing-md);">
        <svg width="240" height="240" viewBox="0 0 240 240" style="grid-area: 1/1; transform: rotate(-90deg);">
            <circle cx="120" cy="120" r="100" fill="none" stroke="rgba(29, 155, 240, 0.05)" stroke-width="8"></circle>
            <circle cx="120" cy="120" r="100" fill="none" class="profit-ring-progress" id="wallet-ring-progress" stroke="url(#blue-gradient)" stroke-width="8" stroke-dasharray="628" stroke-dashoffset="150" stroke-linecap="round" style="transition: stroke-dashoffset 1s ease-out;"></circle>
            <defs>
                <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0F62FE" />
                    <stop offset="100%" stop-color="#1D9BF0" />
                </linearGradient>
            </defs>
        </svg>
        <div style="grid-area: 1/1; text-align: center; pointer-events: none; width: 180px; z-index: 1;">
            <span style="display: block; font-size: 13px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.1em; margin-bottom: 4px;">月商/目標純利益</span>
            <span style="display: block; font-size: clamp(1.5rem, 5vw, 2.5rem); font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; line-height: 1;" id="wallet-global-profit">¥0</span>
            <span style="display: block; font-size: 13px; color: #10b981; margin-top: 8px; font-weight: 400;"><i data-lucide="trending-up" style="width: 14px; height: 14px; display: inline-block; vertical-align: text-bottom;"></i>+15% vs 先月</span>
        </div>
    </div>

    <!-- 3 Indicators (Tax, Fixed Costs, Investment) -->
    <div style="display: grid; grid-auto-flow: column; justify-content: space-between; align-items: center; gap: var(--spacing-sm);">
        <div class="health-indicator-card">
            <div class="health-indicator-label">納税準備</div>
            <div class="health-indicator-value" id="wallet-tax-prep">¥0</div>
            <div class="health-indicator-bar-container">
                <div class="health-indicator-bar" id="wallet-tax-bar" style="width: 0%; background: #FFD400;"></div>
            </div>
        </div>
        <div class="health-indicator-card">
            <div class="health-indicator-label">固定費</div>
            <div class="health-indicator-value" id="wallet-fixed-costs-display">¥120k</div>
            <div class="health-indicator-bar-container">
                <div class="health-indicator-bar" id="wallet-fixed-bar" style="width: 40%; background: #ef4444;"></div>
            </div>
        </div>
        <div class="health-indicator-card">
            <div class="health-indicator-label">投資余力</div>
            <div class="health-indicator-value" id="wallet-investment-display">¥475k</div>
            <div class="health-indicator-bar-container">
                <div class="health-indicator-bar" id="wallet-investment-bar" style="width: 85%; background: var(--accent-neo-blue);"></div>
            </div>
        </div>
    </div>

    <!-- 目標・設定 編集パネル -->
    <div style="margin-top: 12px; padding: 16px; background: rgba(29, 155, 240, 0.03); border: 1px solid var(--btn-secondary-border); border-radius: 16px;">
        <h3 style="font-size: 13px; font-weight: 600; color: var(--text-muted); margin: 0 0 14px 0; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; text-transform: uppercase;">
            <i data-lucide="sliders-horizontal" style="width: 14px; height: 14px;"></i>
            目標・固定値の設定
        </h3>
        <div style="display: grid; gap: 10px;">
            <div style="display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px;">
                <label style="font-size: 12px; color: var(--text-muted); font-weight: 500;">目標純利益（月間）</label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: var(--text-muted);">¥</span>
                    <input id="input-target-profit" type="number" min="0" step="10000"
                        style="width: 110px; background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-weight: 600; text-align: right; outline: none;"
                        onfocus="this.style.borderColor='var(--accent-neo-blue)'"
                        onblur="this.style.borderColor='var(--btn-secondary-border)'"
                        placeholder="1000000">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px;">
                <label style="font-size: 12px; color: var(--text-muted); font-weight: 500;">固定費（月間）</label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: var(--text-muted);">¥</span>
                    <input id="input-fixed-costs" type="number" min="0" step="1000"
                        style="width: 110px; background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-weight: 600; text-align: right; outline: none;"
                        onfocus="this.style.borderColor='var(--accent-neo-blue)'"
                        onblur="this.style.borderColor='var(--btn-secondary-border)'"
                        placeholder="120000">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 8px;">
                <label style="font-size: 12px; color: var(--text-muted); font-weight: 500;">投資余力（月間）</label>
                <div style="display: flex; align-items: center; gap: 4px;">
                    <span style="font-size: 12px; color: var(--text-muted);">¥</span>
                    <input id="input-investment" type="number" min="0" step="1000"
                        style="width: 110px; background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 8px; padding: 6px 8px; font-size: 13px; font-weight: 600; text-align: right; outline: none;"
                        onfocus="this.style.borderColor='var(--accent-neo-blue)'"
                        onblur="this.style.borderColor='var(--btn-secondary-border)'"
                        placeholder="475000">
                </div>
            </div>
        </div>
        <button id="btn-save-wallet-config"
            style="margin-top: 14px; width: 100%; padding: 10px; background: var(--accent-neo-blue); color: #fff; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.2s;"
            onmouseover="this.style.opacity='0.85'"
            onmouseout="this.style.opacity='1'">
            保存する
        </button>
    </div>

    <!-- Cash Flow Wave (Bar Chart) -->
    <div style="margin-top: 10px;">
        <div style="display: grid; grid-auto-flow: column; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h3 style="font-size: 14px; font-weight: 600; color: var(--text-muted); margin: 0; letter-spacing: 0.05em;">キャッシュフロー残高（3ヶ月先予測）</h3>
            <span style="font-size: 12px; color: var(--accent-neo-blue); font-weight: 600;">AI Forecast</span>
        </div>
        <div id="wallet-cf-container" style="display: grid; grid-auto-flow: column; align-items: end; justify-content: space-between; height: 120px; padding: 0 8px;">
            <!-- JS Injected Bars -->
        </div>
        <div style="height: 1px; background: var(--btn-secondary-border); margin-top: 8px;"></div>
    </div>

    <!-- Tax & Accountant Sync Section -->
    <div style="margin-top: var(--spacing-lg); padding: var(--spacing-lg); background: rgba(29, 155, 240, 0.03); border: 1px solid var(--btn-secondary-border); border-radius: 16px;">
        <h3 style="font-size: 14px; font-weight: 600; color: var(--accent-neo-blue); margin: 0 0 12px 0; letter-spacing: 0.05em; display: grid; grid-auto-flow: column; justify-content: start; align-items: center; gap: 8px;">
            <i data-lucide="landmark" style="width: 16px; height: 16px;"></i>
            確定申告・税理士連携
        </h3>

        <div style="font-size: 13px; color: var(--text-main); line-height: 1.6; margin-bottom: 16px; font-family: 'Noto Sans JP', sans-serif;" id="wallet-tax-summary">
            現在ログインしていません。データ同期をお待ちください。
        </div>

        <div style="display: block; gap: 8px;">
            <button id="btn-export-csv" class="btn-primary" style="background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 10px; padding: 12px; font-weight: 600; display: grid; place-items: center; gap: 8px; width: 100%; margin-bottom: 8px;">
                <i data-lucide="file-down" style="width: 16px; height: 16px; color: var(--text-muted);"></i>
                CSV / PDF 書き出し
            </button>
            <button class="btn-primary" style="background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 10px; padding: 12px; font-weight: 600; display: grid; place-items: center; gap: 8px; width: 100%; margin-bottom: 8px;">
                <i data-lucide="send" style="width: 16px; height: 16px; color: var(--accent-neo-blue);"></i>
                税理士へデータ送信
            </button>
            <button id="btn-export-pdf-grid" class="btn-primary" style="background: var(--btn-secondary-bg); color: var(--text-main); border: 1px solid var(--btn-secondary-border); border-radius: 10px; padding: 12px; font-weight: 600; display: grid; place-items: center; gap: 8px; width: 100%;">
                <i data-lucide="receipt" style="width: 16px; height: 16px; color: #10b981;"></i>
                レシート全件ダウンロード
            </button>
        </div>
    </div>
</div>
