<div class="desk-container">
    <header class="desk-header">
        <div>
            <h1 class="desk-title">Ledger Desk</h1>
            <p class="desk-subtitle">AI Bookkeeping Interface</p>
        </div>
        <div>
            <span class="system-health-indicator" style="display:inline-block; width:8px; height:8px; border-radius:50%; background-color:#10b981; margin-right:6px;"></span>
            <span style="font-size:12px; color:var(--text-muted); font-weight:700;">AI Engine Online</span>
        </div>
    </header>

    <!-- Upload Zone -->
    <div id="desk-dropzone" class="desk-dropzone" aria-label="Drop CSV or Excel files here">
        <i data-lucide="file-spreadsheet" class="desk-dropzone-icon"></i>
        <div>
            <p class="desk-dropzone-text">CSVファイル（明細データ）をドロップ</p>
            <p class="desk-dropzone-sub">またはクリックしてファイルを選択</p>
        </div>
        <input type="file" id="desk-file-input" accept=".csv, .txt" style="display:none;" />
    </div>

    <!-- Processing State -->
    <div id="desk-processing-card" class="desk-processing hidden">
        <i data-lucide="bot" style="animation: deskPulse 1.5s infinite; width:24px; height:24px;"></i>
        <span>Neo Gemini Engine が取引明細を解析・仕分けしています...</span>
    </div>

    <!-- Actions -->
    <div class="desk-actions hidden" id="desk-actions">
        <button id="desk-btn-analyze" class="desk-btn desk-btn-secondary" title="Geminiで全自動仕分け">
            <i data-lucide="sparkles"></i> AI 全自動仕分け
        </button>
        <button id="desk-btn-pdf" class="desk-btn desk-btn-secondary" title="PDFで今月のまとめを出力">
            <i data-lucide="file-text"></i> 月次まとめPDF
        </button>
        <button id="desk-btn-save" class="desk-btn desk-btn-primary" title="一括でウォレットに記録">
            <i data-lucide="check-circle-2"></i> 一括登録
        </button>
    </div>

    <!-- Preview Table -->
    <div class="desk-table-container hidden" id="desk-table-wrap">
        <table class="desk-table">
            <thead>
                <tr>
                    <th style="width: 15%">日付</th>
                    <th style="width: 25%">摘要 (取引内容)</th>
                    <th style="width: 15%">金額</th>
                    <th style="width: 20%">科目 (Category)</th>
                    <th style="width: 20%">プロジェクト (Project)</th>
                    <th style="width: 5%"></th>
                </tr>
            </thead>
            <tbody id="desk-preview-tbody">
                <!-- Rows injected via desk.js -->
            </tbody>
        </table>
    </div>
</div>
